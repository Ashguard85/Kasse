server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  resolver 127.0.0.11 valid=10s ipv6=off;

  # Service Worker: kein Cache
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Service-Worker-Allowed "/";
  }

  # Manifest
  location = /manifest.json {
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    set $backend_host kasse-backend;
    proxy_pass http://$backend_host:3801$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
  }

  # Fix: Variable im proxy_pass-Host-Teil kann das automatische Pfad-Mapping
  # uneindeutig machen ("Cannot GET /uploads/" trotz vorhandener Datei).
  # $request_uri reicht den exakten Original-Pfad 1:1 weiter, kein Rätselraten.
  location /uploads/ {
    set $backend_host kasse-backend;
    proxy_pass http://$backend_host:3801$request_uri;
  }
}
