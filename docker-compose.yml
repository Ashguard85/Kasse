version: "3.9"

services:
  kasse-backend:
    build: ./backend
    container_name: kasse-backend
    ports:
      - "3801:3801"
    volumes:
      - /home/buebi/docker/kasse/data:/app/data
    networks:
      - kasse-net
    restart: unless-stopped
    healthcheck:
      # Fix #1 (Review 3): wget ist in node:20-bookworm-slim nicht installiert.
      # node selbst ist immer da, daher nutzen wir das eingebaute fetch() statt wget.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3801/api/articles').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kasse-frontend:
    build: ./frontend
    container_name: kasse-frontend
    ports:
      - "3800:80"
    depends_on:
      kasse-backend:
        condition: service_healthy
    networks:
      - kasse-net
    restart: unless-stopped

networks:
  kasse-net:
    driver: bridge
